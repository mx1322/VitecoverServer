name: Deploy Dev To Local Machine

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-dev-local
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
    defaults:
      run:
        shell: bash
    env:
      DEPLOY_REPO_DIRNAME: deploy-checkout
      DEPLOY_STATE_DIRNAME: deploy-secrets
      TARGET_BRANCH: dev
    steps:
      - name: Prepare deployment checkout
        run: |
          set -euo pipefail
          REPO_DIR="${RUNNER_WORKSPACE}/${DEPLOY_REPO_DIRNAME}"

          mkdir -p "$REPO_DIR"

          if [ -d "$REPO_DIR/.git" ]; then
            echo "Using existing deployment checkout: $REPO_DIR"
            exit 0
          fi

          if [ -n "$(find "$REPO_DIR" -mindepth 1 -maxdepth 1 -print -quit)" ]; then
            echo "Deployment directory exists but is not a git repository: $REPO_DIR"
            exit 1
          fi

          git clone --branch "$TARGET_BRANCH" "https://github.com/${GITHUB_REPOSITORY}.git" "$REPO_DIR"

      - name: Verify deployment prerequisites
        run: |
          set -euo pipefail
          REPO_DIR="${RUNNER_WORKSPACE}/${DEPLOY_REPO_DIRNAME}"
          STATE_DIR="${RUNNER_WORKSPACE}/${DEPLOY_STATE_DIRNAME}"
          cd "$REPO_DIR"

          git fetch origin
          git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          git reset --hard "origin/$TARGET_BRANCH"

          mkdir -p "$STATE_DIR"

          if [ -f deploy/linux/.env.deploy ] && [ ! -f "$STATE_DIR/.env.deploy" ]; then
            cp deploy/linux/.env.deploy "$STATE_DIR/.env.deploy"
          fi

          if [ -f "$STATE_DIR/.env.deploy" ]; then
            cp "$STATE_DIR/.env.deploy" deploy/linux/.env.deploy
          fi

          test -x ./up.sh
          test -f deploy/linux/.env.deploy
          test -f backend/docker-compose.yml
          test -f docker-compose.override.yml
          command -v docker >/dev/null
          docker --version
          docker compose version

      - name: Validate workflow and shell syntax
        run: |
          set -euo pipefail
          REPO_DIR="${RUNNER_WORKSPACE}/${DEPLOY_REPO_DIRNAME}"
          cd "$REPO_DIR"

          test -d .github/workflows
          docker run --rm -v "$REPO_DIR:/repo" -w /repo rhysd/actionlint:1.7.7 .github/workflows/*.yml
          bash -n ./up.sh ./deploy/linux/up.sh ./deploy/linux/down.sh

      - name: Deploy latest dev branch
        run: |
          set -euo pipefail
          REPO_DIR="${RUNNER_WORKSPACE}/${DEPLOY_REPO_DIRNAME}"
          cd "$REPO_DIR"

          docker compose --env-file deploy/linux/.env.deploy -f backend/docker-compose.yml -f docker-compose.override.yml config >/dev/null
          docker build -f frontend/Dockerfile --target builder -t vitecover-frontend-buildcheck ./frontend >/dev/null

          ./up.sh

      - name: Show deployment failure details
        if: failure()
        run: |
          set +e
          REPO_DIR="${RUNNER_WORKSPACE}/${DEPLOY_REPO_DIRNAME}"

          if [ ! -d "$REPO_DIR" ]; then
            echo "Deployment directory not found: $REPO_DIR"
            exit 0
          fi

          if ! cd "$REPO_DIR"; then
            echo "Unable to enter deployment directory: $REPO_DIR"
            exit 0
          fi

          if [ ! -d .git ]; then
            echo "Deployment directory is not a git repository: $REPO_DIR"
            exit 0
          fi

          echo "== Git HEAD =="
          git rev-parse --short HEAD

          echo "== Docker Compose PS =="
          if [ -f deploy/linux/.env.deploy ]; then
            docker compose --env-file deploy/linux/.env.deploy -f backend/docker-compose.yml -f docker-compose.override.yml ps
          else
            echo "Missing deploy/linux/.env.deploy in deployment checkout."
            echo "Expected persistent env file at: ${RUNNER_WORKSPACE}/${DEPLOY_STATE_DIRNAME}/.env.deploy"
          fi

          echo "== Recent Docker Compose Logs =="
          if [ -f deploy/linux/.env.deploy ]; then
            docker compose --env-file deploy/linux/.env.deploy -f backend/docker-compose.yml -f docker-compose.override.yml logs --tail=120
          else
            echo "Skipping logs because deploy/linux/.env.deploy is missing."
            echo "Expected persistent env file at: ${RUNNER_WORKSPACE}/${DEPLOY_STATE_DIRNAME}/.env.deploy"
          fi

      - name: Show deployed revision
        if: success()
        run: |
          REPO_DIR="${RUNNER_WORKSPACE}/${DEPLOY_REPO_DIRNAME}"
          cd "$REPO_DIR"
          echo "Deployed commit: $(git rev-parse --short HEAD)"
