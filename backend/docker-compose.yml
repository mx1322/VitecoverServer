services:
  postgres:
    image: postgres:16-alpine
    container_name: directus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: directus_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  directus:
    image: directus/directus:11.12.0
    container_name: directus_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - path: ../.env
        required: false
    environment:
      DB_CLIENT: ${DB_CLIENT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS: redis://redis:6379
      WEBSOCKETS_ENABLED: "true"
    ports:
      - "8055:8055"
    volumes:
      - ${DIRECTUS_UPLOADS_DIR:-./uploads}:/directus/uploads
      - ./directus/extensions:/directus/extensions

  nginx:
    image: nginx:1.27-alpine
    container_name: directus_nginx
    restart: unless-stopped
    depends_on:
      - directus
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  redis_data:
