services:
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: vitecover_minio
    restart: unless-stopped
    env_file:
      - ../deploy/linux/.env.deploy
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ../data/minio:/data

  directus:
    container_name: vitecover_directus
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    env_file:
      - ../deploy/linux/.env.deploy
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      PUBLIC_URL: ${PUBLIC_URL}
      STORAGE_LOCATIONS: minio
      STORAGE_MINIO_DRIVER: s3
      STORAGE_MINIO_KEY: ${MINIO_ROOT_USER}
      STORAGE_MINIO_SECRET: ${MINIO_ROOT_PASSWORD}
      STORAGE_MINIO_BUCKET: ${MINIO_BUCKET}
      STORAGE_MINIO_ENDPOINT: http://minio:9000
      STORAGE_MINIO_REGION: ${MINIO_REGION}
      STORAGE_MINIO_FORCE_PATH_STYLE: "true"
    ports:
      # Keep Directus default port for backend/dev debugging, but bind to localhost only.
      # Public/LAN traffic should go through the edge reverse proxy (`nginx` service).
      - "${DIRECTUS_DEV_BIND:-127.0.0.1}:${DIRECTUS_DEV_PORT:-8055}:8055"
    expose:
      - "8055"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: vitecover_frontend
    restart: unless-stopped
    env_file:
      - ../deploy/linux/.env.deploy
    environment:
      NODE_ENV: production
      PORT: 3000
      DIRECTUS_INTERNAL_URL: http://nginx/directus
    depends_on:
      - directus
    expose:
      - "3000"

  nginx:
    container_name: vitecover_edge
    depends_on:
      - frontend
      - directus
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
    volumes:
      - ../compose/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
