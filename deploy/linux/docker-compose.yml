services:
  postgres:
    image: postgres:16-alpine
    container_name: vitecover_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ../../backend/data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vitecover_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: vitecover_minio
    restart: unless-stopped
    env_file:
      - .env.deploy
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
    volumes:
      - ../../backend/data/minio:/data

  directus:
    image: directus/directus:11.12.0
    container_name: vitecover_directus
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      DB_CLIENT: ${DB_CLIENT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PUBLIC_URL: ${PUBLIC_URL}
      REDIS: redis://redis:6379
      WEBSOCKETS_ENABLED: "true"
      STORAGE_LOCATIONS: minio
      STORAGE_MINIO_DRIVER: s3
      STORAGE_MINIO_KEY: ${MINIO_ROOT_USER}
      STORAGE_MINIO_SECRET: ${MINIO_ROOT_PASSWORD}
      STORAGE_MINIO_BUCKET: ${MINIO_BUCKET}
      STORAGE_MINIO_ENDPOINT: http://minio:9000
      STORAGE_MINIO_REGION: ${MINIO_REGION}
      STORAGE_MINIO_FORCE_PATH_STYLE: "true"
    expose:
      - "8055"
    volumes:
      - ../../backend/directus/extensions:/directus/extensions

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: vitecover_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_DIRECTUS_URL: ${NEXT_PUBLIC_DIRECTUS_URL}
    depends_on:
      - directus
    expose:
      - "3000"

  edge:
    image: nginx:1.27-alpine
    container_name: vitecover_edge
    restart: unless-stopped
    depends_on:
      - frontend
      - directus
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  redis_data:
